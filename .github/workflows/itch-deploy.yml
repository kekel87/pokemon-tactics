name: Deploy to itch.io

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v0.7.0)'
        required: true
        default: 'dev'

permissions:
  contents: read

concurrency:
  group: itch-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (itch base path)
        env:
          ITCH_DEPLOY: 'true'
        run: pnpm build

      - name: Push to itch.io
        uses: Ayowel/butler-to-itch@v1.3.0
        with:
          butler_key: ${{ secrets.BUTLER_API_KEY }}
          itch_user: kekel87
          itch_game: pokemon-tactics
          version: ${{ github.event.release.tag_name || inputs.version }}
          files: |
            html5 packages/app/dist
