name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why?
      description: Why would this be useful? What problem does it solve?
    validations:
      required: false
