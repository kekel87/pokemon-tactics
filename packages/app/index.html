<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Pokemon Tactics</title>
    <style>
      @font-face {
        font-family: "PokemonEmeraldPro";
        src:
          url("/assets/fonts/pokemon-emerald-pro.woff2") format("woff2"),
          url("/assets/fonts/pokemon-emerald-pro.ttf") format("truetype");
        font-display: block;
      }
      @layer reset {
        html, body {
          margin: 0;
          padding: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          /* Hex inline car CSS principal pas encore chargé au paint initial.
             Doit rester aligné sur --color-bg-base (var(--tb-blue-850)) dans tokens.css. */
          background: #1a1a2e;
        }
      }
      #game-root {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script type="module" src="/src/babylon-boot.ts"></script>
  </body>
</html>
